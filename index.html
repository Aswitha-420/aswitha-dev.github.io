<!DOCTYPE html>
<html>
<head>
    <title>Aswitha A | DevOps Engineer</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
            color: white;
        }

        /* WELCOME PAGE */
        #welcome {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #welcome h1 {
            font-size: 40px;
            color: #00eaff;
        }

        #welcome button {
            margin-top: 20px;
            padding: 12px 25px;
            background: #00eaff;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            width: 100%;
            background: #111;
            padding: 15px;
            text-align: center;
            top: 0;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
        }

        /* SECTIONS */
        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* DIFFERENT BACKGROUNDS */
        #home {
            background: linear-gradient(to right, #141e30, #243b55);
        }

        #about {
            background: #1c1c1c;
        }

        #skills {
            background: #2c3e50;
        }

        #projects {
            background: #1a1a1a;
        }

        #contact {
            background: #34495e;
        }

        .box {
            width: 80%;
            max-width: 700px;
        }

        img {
            width: 130px;
            border-radius: 50%;
            border: 3px solid #00eaff;
        }

        .btn {
            background: #00eaff;
            padding: 10px 20px;
            text-decoration: none;
            color: black;
            display: inline-block;
            margin-top: 10px;
        }

        i {
            color: #00eaff;
            margin-right: 8px;
        }
    </style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome">
    <h1>WELCOME TO MY ENVIRONMENT</h1>
    <button onclick="enterSite()">Enter</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</div>

<!-- HOME -->
<div id="home" class="section">
    <div class="box">
        <img src="https://via.placeholder.com/150">
        <h1>Aswitha A</h1>
        <p>Cloud & DevOps Engineer</p>
    </div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
    <div class="box">
        <h2><i class="fas fa-user"></i>About</h2>
        <p>Focused on AWS, CI/CD, and automation.</p>
    </div>
</div>

<!-- SKILLS -->
<div id="skills" class="section">
    <div class="box">
        <h2><i class="fas fa-tools"></i>Skills</h2>
        <p><i class="fab fa-aws"></i>AWS | Jenkins | Terraform | GitHub</p>
    </div>
</div>

<!-- PROJECTS -->
<div id="projects" class="section">
    <div class="box">
        <h2><i class="fas fa-code"></i>Projects</h2>
        <p>CI/CD Pipeline | AWS Hosting</p>
    </div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
    <div class="box">
        <h2><i class="fas fa-envelope"></i>Contact</h2>
        <p>Email: yourmail@gmail.com</p>
    </div>
</div>

<!-- JS -->
<script>
function enterSite() {
    document.getElementById("welcome").style.display = "none";
}
</script>

</body>
</html>
